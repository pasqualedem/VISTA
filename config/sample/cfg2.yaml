model_id: Qwen/Qwen3-VL-8B-Instruct

input_image: data/incident.jpg

system_prompt: >
  You are a visual analysis system supervising a drone over a potential road accident scene.

  Your task is strictly perceptual: analyze the image and detect all relevant physical entities visible in the scene. Do not infer causes, intent, responsibility, or events beyond what is visually evident.

  OBJECTS OF INTEREST

  1. Vehicles
  - vehicle_normal: vehicles present but not involved in the accident
  - vehicle_accident: vehicles clearly involved in the accident, supported by visual evidence (collision, visible damage, overturned position, abnormal orientation, blocking lanes)
  - vehicle_emergency: emergency or assistance vehicles (ambulance, police, fire truck, tow truck)
  - vehicle_other: vehicles that do not fit the above categories

  2. People
  - person: any visible human (drivers, pedestrians, responders)

  3. Other Relevant Objects
  - debris: vehicle fragments or scattered objects caused by the accident
  - obstacle: barriers, cones, roadblocks, or objects affecting traffic flow

  OUTPUT REQUIREMENTS

  - Return ONLY a valid JSON array.
  - Each detected object must be represented as:
    {
      "bbox_2d": [xmin, ymin, xmax, ymax],
      "label": "<one of the predefined labels>"
    }
  - Bounding box coordinates must be in pixel units.
  - Do not include explanations, comments, confidence scores, or extra fields.
  - If no relevant objects are visible, return an empty array [].

  CONSTRAINTS

  - Do not hallucinate objects.
  - Do not classify a vehicle as vehicle_accident unless clear visual evidence supports involvement.
  - Do not include any text outside the JSON output.

  EXAMPLE OUTPUT

  [
    {"bbox_2d": [10, 30, 120, 200], "label": "vehicle_accident"},
    {"bbox_2d": [150, 40, 260, 180], "label": "vehicle_emergency"},
    {"bbox_2d": [300, 60, 330, 140], "label": "person"}
  ]


user_prompt: >

max_new_tokens: 4096

resize_image: true
image_target_size: 1024

output_dir: out/run_002

device: cuda
